<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexprox | Secure Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Roboto+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --primary: #00ff66;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 255, 102, 0.2);
            --text-muted: #8a8f98;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #0a1219 0%, #05070a 100%);
            font-family: 'Outfit', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            z-index: 10;
        }

        .logo {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 4px;
            color: var(--primary);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .tagline {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
            letter-spacing: 1px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 16px;
            color: var(--text-muted);
            font-size: 18px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px 48px 16px 48px;
            color: white;
            font-family: inherit;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 255, 102, 0.05);
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.1);
            transform: scale(1.02);
        }

        .input-group label {
            position: absolute;
            left: 48px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input:focus + label,
        input:not(:placeholder-shown) + label {
            top: -12px;
            left: 12px;
            font-size: 10px;
            background: var(--bg);
            padding: 2px 8px;
            color: var(--primary);
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.3s;
            z-index: 10;
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
            text-transform: uppercase;
        }

        button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px rgba(0, 255, 102, 0.4);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(-1px) scale(1.0);
        }

        .step-transition {
            animation: slideUpFade 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error {
            color: #ff4d4d;
            font-size: 14px;
            margin-top: 16px;
            display: none;
        }

        .footer {
            margin-top: 25px;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .policy-links {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .policy-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 10px;
            font-weight: 600;
            transition: color 0.2s;
        }

        .policy-links a:hover {
            color: var(--primary);
        }

        /* Local Dev Mode Hint */
        #dev-hint {
            display: none;
            background: rgba(0, 255, 102, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px;
            border-radius: 8px;
            font-size: 11px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>
    <div class="glow"></div>
    <div class="login-card" id="login-container">
        <div class="logo">NEXPROX</div>
        <div class="tagline">SECURE ACCESS GATEWAY</div>

        <div id="step-email">
            <div class="tagline" style="margin-bottom: 20px;">ENTER EMAIL ADDRESS</div>
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="text" id="req-email" placeholder="Address key" autocomplete="off">
            </div>
            <button id="request-btn">GENERATE ACCESS KEY</button>
            <div id="req-msg" class="error" style="color: var(--primary)"></div>
        </div>

        <div id="step-username" style="display: none;">
            <div class="tagline" style="margin-bottom: 20px;">ENTER YOUR UNIQUE IDENTITY</div>
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" placeholder=" " autocomplete="off">
                <label>Username</label>
            </div>
            <button id="confirm-user-btn">CONFIRM USERNAME</button>
            <div id="user-msg" class="error"></div>
            <div style="margin-top: 15px; font-size: 11px;">
                <a href="#" id="back-to-email" style="color: var(--text-muted); text-decoration: none; letter-spacing: 1px; transition: color 0.2s;">&lt; REQUEST NEW KEY</a>
            </div>
        </div>

        <div id="step-password" style="display: none;">
            <div class="tagline" style="margin-bottom: 20px;">ENTER YOUR SECURE PASSWORD</div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder=" ">
                <label>Password</label>
                <i class="fa-solid fa-eye toggle-password" id="toggle-p"></i>
            </div>
            <button id="login-btn">INITIALIZE HANDSHAKE</button>
            <div id="error-msg" class="error">INVALID ACCESS CREDENTIALS</div>
        </div>

        <div class="footer">Encrypted Session v2.5</div>
        <div class="policy-links">
            <a href="README.md" target="_blank">PRIVACY POLICY</a>
            <a href="README.md" target="_blank">TERMS OF SERVICE</a>
        </div>
    </div>

    <script>
        const stepEmail = document.getElementById('step-email');
        const stepUsername = document.getElementById('step-username');
        const stepPassword = document.getElementById('step-password');

        const requestBtn = document.getElementById('request-btn');
        const confirmUserBtn = document.getElementById('confirm-user-btn');
        const loginBtn = document.getElementById('login-btn');

        const reqMsg = document.getElementById('req-msg');
        const userMsg = document.getElementById('user-msg');
        const err = document.getElementById('error-msg');

        // Step 1: Request Credentials or Bypass
        requestBtn.addEventListener('click', async () => {
            const emailOrKey = document.getElementById('req-email').value;
            if (!emailOrKey) {
                reqMsg.style.color = '#ff4d4d';
                reqMsg.textContent = 'INPUT REQUIRED';
                reqMsg.style.display = 'block';
                return;
            }

            // MASTER PASSWORD BYPASS
            if (emailOrKey === 'NEXPROX_DEV_2026') {
                reqMsg.style.color = '#00ff66';
                reqMsg.textContent = 'DEV BYPASS ACTIVATED...';
                reqMsg.style.display = 'block';
                // Trigger backend bypass
                fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'master', password: emailOrKey })
                }).then(res => res.json()).then(data => {
                    if (data.success) {
                        localStorage.setItem('nx_session', data.token);
                        localStorage.setItem('nx_node_verified', 'true');
                        window.location.href = '/index.html';
                    }
                }).catch(() => {
                    reqMsg.style.color = '#ff4d4d';
                    reqMsg.textContent = 'BACKEND OFFLINE';
                });
                return;
            }

            requestBtn.disabled = true;
            reqMsg.style.color = '#00ff66';
            reqMsg.textContent = 'DISPATCHING TO SECURE MAIL...';
            reqMsg.style.display = 'block';

            try {
                const res = await fetch('/api/auth/request-access', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailOrKey })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('nx_returning_user', 'true');
                    reqMsg.textContent = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
                        ? 'CODE RETRIEVED FROM LOCAL HANDSHAKE'
                        : 'CREDENTIALS DISPATCHED. CHECK INBOX.';

                    // IF LOCAL DEV DATA IS RETURNED
                    if (data.credentials) {
                        document.getElementById('username').value = data.credentials.username;
                        document.getElementById('password').value = data.credentials.password;
                        reqMsg.textContent += " (AUTO-FILLED)";
                    }

                    // Transition to step 2 after a successful request
                    setTimeout(() => {
                        stepEmail.style.display = 'none';
                        stepUsername.style.display = 'block';
                        stepUsername.classList.add('step-transition');
                    }, 1000);
                } else {
                    reqMsg.style.color = '#ff4d4d';
                    reqMsg.textContent = 'ERROR: ' + (data.message || data.errorDetail || 'COULD NOT SEND. Check Gmail credentials.');
                }
            } catch (e) {
                console.error('Request Error:', e);
                reqMsg.style.color = '#ff4d4d';
                reqMsg.textContent = 'SECURE CHANNEL OFFLINE';
            } finally {
                requestBtn.disabled = false;
            }
        });

        // Toggle Password Visibility
        const toggleP = document.getElementById('toggle-p');
        const passInput = document.getElementById('password');
        toggleP.addEventListener('click', () => {
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);
            toggleP.classList.toggle('fa-eye');
            toggleP.classList.toggle('fa-eye-slash');
        });

        // Step 2: Confirm Username
        confirmUserBtn.addEventListener('click', () => {
            const u = document.getElementById('username').value;
            if (!u) {
                userMsg.style.color = '#ff4d4d';
                userMsg.textContent = 'USERNAME REQUIRED';
                userMsg.style.display = 'block';
                return;
            }
            stepUsername.style.display = 'none';
            stepPassword.style.display = 'block';
        });

        // Step 3: Initialize Handshake (Login)
        loginBtn.addEventListener('click', function () {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            if (!u || !p) {
                err.textContent = 'PLEASE COMPLETE ALL FIELDS';
                err.style.display = 'block';
                return;
            }

            err.textContent = 'INITIATING HANDSHAKE...';
            err.style.color = '#00ff66';
            err.style.display = 'block';

            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            })
                .then(res => {
                    if (res.status === 403) {
                        return res.json().then(d => { throw new Error(d.message || 'IP_LOCK'); });
                    }
                    return res.json();
                })
                .then(data => {
                    if (data.success) {
                        localStorage.setItem('nx_session', data.token);
                        localStorage.setItem('nx_node_verified', 'true');
                        window.location.href = '/index.html';
                    } else {
                        err.style.color = '#ff4d4d';
                        err.textContent = 'ACCESS DENIED: ' + (data.message || 'UNRECOGNIZED');
                        err.style.display = 'block';
                    }
                })
                .catch((e) => {
                    err.style.color = '#ff4d4d';
                    err.textContent = e.message.includes('locked') ? e.message : 'BACKEND OFFLINE';
                    err.style.display = 'block';
                });
        });

        // Initialize Returning User State
        if (localStorage.getItem('nx_returning_user') === 'true' || localStorage.getItem('nx_node_verified') === 'true') {
            stepEmail.style.display = 'none';
            stepUsername.style.display = 'block';
        }

        // Handle Back button
        const backToEmail = document.getElementById('back-to-email');
        if (backToEmail) {
            backToEmail.addEventListener('click', (e) => {
                e.preventDefault();
                stepUsername.style.display = 'none';
                stepEmail.style.display = 'block';
            });
        }
    </script>
</body>

</html>
